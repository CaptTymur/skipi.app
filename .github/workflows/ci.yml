  #     - uses: android-actions/setup-android@v3   # SDK + NDK
  #     - uses: dtolnay/rust-toolchain@stable
  #       with: { targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android }
  #     - run: cargo install tauri-cli --version '^2'
  #     - working-directory: src-tauri
  #       run: cargo tauri android build --apk --debug
  #
  # ios-compile:
  #   runs-on: macos-latest   # Xcode preinstalled
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #       with: { targets: aarch64-apple-ios-sim }
  #     - run: cargo install tauri-cli --version '^2'
  #     - working-directory: src-tauri
  #       run: cargo tauri ios build --target aarch64-sim --no-sign
