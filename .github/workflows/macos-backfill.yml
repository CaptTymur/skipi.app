name: macOS Backfill

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish macOS assets to (example: v0.4.128)'
        required: true
        default: 'v0.4.128'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS and upload to release
    runs-on: macos-15-intel
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Build and upload macOS assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag }}
          releaseName: "Skipi ${{ github.event.inputs.tag }}"
          args: --target x86_64-apple-darwin
          releaseDraft: false
          prerelease: false
