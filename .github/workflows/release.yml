# Skipi — Release workflow
#
# Trigger: push a git tag like `v0.4.103`
#   git tag v0.4.103
#   git push origin v0.4.103
#
# Slice G1, Rail 1 (2026-05-03):
#   * Linux release MUST succeed even when Windows Authenticode signing is
#     broken or unconfigured. For closed testing we still build an unsigned
#     Windows installer; only the Tauri updater artifact is minisign-signed.
#   * Windows test builds are mandatory from v0.4.106 onward. macOS builds
#     are paused from 2026-05-12 to save GitHub Actions minutes.
#   * A post-publish validation job (`verify-release`) downloads the
#     just-published latest.json and asserts version, URLs, sigs.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# One release at a time.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------
  # Pre-flight: parse the inline JS in dist/index.html and fail fast on
  # syntax errors. A single missing ')' inside an event handler or helper
  # function has shipped multiple broken releases before this gate existed
  # (v0.4.36 / .37 / .38 all crashed on the welcome screen due to one
  # unclosed `order.forEach(function(cat){...})` — invisible until the app
  # actually loaded in WebView2/WebKitGTK). Runs in ~10s and blocks the
  # whole pipeline if the bundled JS does not parse.
  # ----------------------------------------------------------------------
  syntax-check:
    name: JS syntax check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check inline JS in dist/index.html
        run: |
          node -e '
            const fs = require("fs");
            const html = fs.readFileSync("dist/index.html", "utf8");
            const blocks = [...html.matchAll(/<script>([\s\S]*?)<\/script>/g)].map(m => m[1]);
            if (!blocks.length) { console.error("no <script> blocks found"); process.exit(1); }
            const main = blocks.reduce((a,b) => a.length > b.length ? a : b, "");
            try {
              new Function(main);
              console.log("JS syntax OK (" + main.length + " chars across " + blocks.length + " blocks)");
            } catch (e) {
              console.error("SYNTAX ERROR in dist/index.html inline JS:");
              console.error("  " + e.message);
              process.exit(1);
            }
          '

  # ----------------------------------------------------------------------
  # Pre-flight: tagged commit MUST have its version files bumped. v0.4.96
  # was tagged on a docs-only commit while Cargo.toml/tauri.conf were
  # still at 0.4.78 — the published manifest therefore advertised 0.4.78
  # under the v0.4.96 tag and broke auto-update. This guard rejects any
  # tag whose name does not match the actual built version.
  # ----------------------------------------------------------------------
  version-check:
    name: Version match (tag vs files)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare tag against version files
        run: |
          set -eu
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(grep -m1 -E '^version = "' src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          CONF_VERSION="$(grep -m1 -E '"version"' src-tauri/tauri.conf.json | sed -E 's/.*"version"[^"]*"([^"]+)".*/\1/')"
          HTML_VERSION="$(grep -m1 -E "var APP_VERSION='" dist/index.html | sed -E "s/.*APP_VERSION='([^']+)'.*/\1/")"
          echo "tag:           $TAG_VERSION"
          echo "Cargo.toml:    $CARGO_VERSION"
          echo "tauri.conf:    $CONF_VERSION"
          echo "APP_VERSION:   $HTML_VERSION"
          fail=0
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match Cargo.toml $CARGO_VERSION"
            fail=1
          fi
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match tauri.conf.json $CONF_VERSION"
            fail=1
          fi
          if [ "$TAG_VERSION" != "$HTML_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match dist/index.html APP_VERSION $HTML_VERSION"
            fail=1
          fi
          exit "$fail"

  # ----------------------------------------------------------------------
  # Linux build — load-bearing for the Linux beta auto-updater audience.
  # ----------------------------------------------------------------------
  build-linux:
    name: Build (Linux)
    needs: [syntax-check, version-check]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Tauri AppImage tools
        uses: actions/cache@v4
        with:
          path: ~/.cache/tauri
          key: ${{ runner.os }}-tauri-appimage-tools-v1

      - name: Preload AppImage bundler tools
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/tauri"
          download_tool() {
            local url="$1"
            local out="$2"
            if [ ! -s "$out" ]; then
              curl -fL --retry 8 --retry-all-errors --retry-delay 5 --connect-timeout 30 --max-time 300 -o "$out" "$url"
            fi
            chmod +x "$out"
          }
          download_tool "https://github.com/tauri-apps/binary-releases/releases/download/apprun-old/AppRun-x86_64" "$HOME/.cache/tauri/AppRun-x86_64"
          download_tool "https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-x86_64.AppImage" "$HOME/.cache/tauri/linuxdeploy-x86_64.AppImage"
          download_tool "https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh" "$HOME/.cache/tauri/linuxdeploy-plugin-gtk.sh"
          download_tool "https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gstreamer/master/linuxdeploy-plugin-gstreamer.sh" "$HOME/.cache/tauri/linuxdeploy-plugin-gstreamer.sh"
          download_tool "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage" "$HOME/.cache/tauri/linuxdeploy-plugin-appimage.AppImage"

      - name: Build Skipi (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Skipi ${{ github.ref_name }}"
          releaseBody: |
            ## Skipi ${{ github.ref_name }}

            Maritime Document Management for Seafarers.

            ### Download

            | Platform | File | Signed? |
            |----------|------|---------|
            | Linux (Debian/Ubuntu) | `.deb` | minisign (updater) |
            | Linux (universal) | `.AppImage` | minisign (updater) |
            | Linux (RPM-based) | `.rpm` | minisign (updater) |
            | Windows (test) | `.msi` / `.exe` | no Authenticode; minisign for updater |

            macOS beta artifacts are temporarily paused to save GitHub Actions minutes.

            ### What's new

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ---

            > **Beta build.** This is a pre-release version for invited testers.
            > All data stays on your computer.
            >
            > **Auto-update:** Existing Skipi installations will be notified about this update automatically.
          releaseDraft: false
          prerelease: false

  # ----------------------------------------------------------------------
  # macOS build — paused from 2026-05-12 to save GitHub Actions minutes.
  # Keep the job definition in place so it can be re-enabled quickly later.
  # ----------------------------------------------------------------------
  build-macos:
    name: Build (macOS unsigned)
    if: ${{ false }}
    needs: [syntax-check, version-check]
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Build Skipi (macOS unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Skipi ${{ github.ref_name }}"
          args: --target x86_64-apple-darwin
          releaseDraft: false
          prerelease: false

  # ----------------------------------------------------------------------
  # Windows build — unsigned test installer. This intentionally does not use
  # Azure Trusted Signing / Authenticode while the app is in closed testing.
  # Tauri updater signatures are still created via TAURI_SIGNING_PRIVATE_KEY.
  # ----------------------------------------------------------------------
  build-windows:
    name: Build (Windows unsigned)
    needs: [syntax-check, version-check]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Disable Authenticode config for tester build
        shell: bash
        run: |
          set -eu
          mv src-tauri/tauri.windows.conf.json src-tauri/tauri.windows.conf.json.disabled

      - name: Build Skipi (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Skipi ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false

  # ----------------------------------------------------------------------
  # Manifest publication — Linux and Windows test builds are mandatory.
  # macOS is intentionally omitted while macOS builds are paused.
  # ----------------------------------------------------------------------
  publish-latest-json:
    name: Publish latest.json
    needs: [build-linux, build-windows]
    if: needs.build-linux.result == 'success' && needs.build-windows.result == 'success'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build latest.json from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          WIN_OUTCOME: ${{ needs.build-windows.result }}
        run: |
          set -eu
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          echo "Windows job outcome: ${WIN_OUTCOME}"

          mkdir -p sigs
          cd sigs
          gh release download "${TAG}" --repo "${REPO}" --pattern '*.sig' || true
          ls -la

          read_sig() {
            local f="$1"
            if [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          asset_url() {
            local f="$1"
            local encoded
            encoded="$(jq -rn --arg x "$f" '$x|@uri')"
            echo "${BASE_URL}/${encoded}"
          }

          # Windows entry only when the Windows job actually finished.
          WIN_SIG=""
          WIN_URL=""
          if [ "${WIN_OUTCOME}" = "success" ]; then
            if [ -f "Skipi_${VERSION}_x64-setup.exe.sig" ]; then
              WIN_SIG="$(read_sig "Skipi_${VERSION}_x64-setup.exe.sig")"
              WIN_URL="$(asset_url "Skipi_${VERSION}_x64-setup.exe")"
            elif [ -f "Skipi_${VERSION}_x64_en-US.msi.sig" ]; then
              WIN_SIG="$(read_sig "Skipi_${VERSION}_x64_en-US.msi.sig")"
              WIN_URL="$(asset_url "Skipi_${VERSION}_x64_en-US.msi")"
            else
              WIN_ASSET="$(find . -maxdepth 1 -type f \( -name '*.exe.sig' -o -name '*.msi.sig' \) | head -n1 || true)"
              if [ -n "$WIN_ASSET" ]; then
                WIN_ASSET="${WIN_ASSET#./}"
                WIN_SIG="$(read_sig "$WIN_ASSET")"
                WIN_URL="$(asset_url "${WIN_ASSET%.sig}")"
              fi
            fi
          fi
          if [ -z "$WIN_URL" ]; then
            echo "::error::Windows build succeeded but no .exe.sig or .msi.sig was found; refusing to publish a release without Windows."
            exit 1
          fi

          # Linux: prefer AppImage (self-contained, portable for updater).
          LINUX_SIG=""
          LINUX_URL=""
          APPIMG="$(ls Skipi_${VERSION}_amd64*.AppImage.sig 2>/dev/null | head -n1 || true)"
          if [ -n "$APPIMG" ]; then
            LINUX_SIG="$(read_sig "$APPIMG")"
            LINUX_URL="$(asset_url "${APPIMG%.sig}")"
          fi
          if [ -z "$LINUX_URL" ]; then
            echo "::error::Linux .AppImage.sig not found in release; manifest would be empty."
            exit 1
          fi

          cd ..

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "Skipi $VERSION" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "$WIN_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$LINUX_URL" \
            '
            def plat(sig; url):
              if (sig|length) > 0 and (url|length) > 0
              then {signature: sig, url: url}
              else null end;

            {
              version: $version,
              pub_date: $pub_date,
              notes: $notes,
              platforms: (
                {
                  "windows-x86_64": plat($win_sig; $win_url),
                  "linux-x86_64":   plat($linux_sig; $linux_url)
                }
                | with_entries(select(.value != null))
              )
            }
            ' > latest.json

          echo "--- latest.json ---"
          cat latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          gh release upload "${TAG}" latest.json --repo "${REPO}" --clobber

  # ----------------------------------------------------------------------
  # Post-release validation — re-fetches the just-uploaded latest.json
  # and asserts that the manifest reports the tag's version, that every
  # platform URL responds 200, and that .sig assets exist next to each
  # binary. If any of these fail, the release is broken even though the
  # earlier jobs reported success.
  # ----------------------------------------------------------------------
  verify-release:
    name: Verify release manifest
    needs: [publish-latest-json]
    runs-on: ubuntu-22.04
    steps:
      - name: Verify
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          # Pause briefly so GitHub release CDN catches the freshly-uploaded
          # asset — observed lag is sub-second but we leave headroom.
          sleep 5

          curl -sSLf -o latest.json "${BASE_URL}/latest.json"
          echo "--- latest.json ---"
          cat latest.json

          MANIFEST_VERSION="$(jq -r .version latest.json)"
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "::error::manifest version $MANIFEST_VERSION != tag $VERSION"
            exit 1
          fi

          # .deb installs do not use the AppImage URL from latest.json for
          # installation. The frontend detects deb installs and calls the
          # Rust `install_deb_update(version)` command, which downloads this
          # conventional asset name directly from the release. If it is
          # missing, update checks would pass but every existing Linux beta
          # user installed via dpkg would hit HTTP 404 on "Download".
          for asset in \
            "Skipi_${VERSION}_amd64.deb" \
            "Skipi_${VERSION}_amd64.deb.sig"
          do
            url="${BASE_URL}/${asset}"
            echo "checking release asset -> $url"
            code="$(curl -sSL -o /dev/null -w '%{http_code}' "$url")"
            if [ "$code" != "200" ]; then
              echo "::error::required Linux .deb asset $url -> HTTP $code"
              exit 1
            fi
          done

          # Every URL inside platforms must respond 200, and each must
          # have a non-empty signature embedded.
          jq -r '.platforms | to_entries[] | "\(.key) \(.value.url) \(.value.signature|length)"' latest.json \
          | while read -r plat url siglen; do
              if [ -z "$url" ]; then
                echo "::error::$plat has empty url"; exit 1
              fi
              if [ "$siglen" = "0" ]; then
                echo "::error::$plat has empty signature"; exit 1
              fi
              echo "checking $plat -> $url"
              code="$(curl -sSL -o /dev/null -w '%{http_code}' "$url")"
              if [ "$code" != "200" ]; then
                echo "::error::$plat $url -> HTTP $code"; exit 1
              fi
            done
          echo "manifest OK"
