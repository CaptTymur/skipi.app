# Skipi — Cross-platform release build
#
# Trigger: push a git tag like `v0.1.0` or `v0.2.0-beta.1`
#   git tag v0.1.0
#   git push origin v0.1.0
#
# What happens:
#   1. Builds Skipi on macOS (arm64 + x64), Windows (x64), Linux (x64)
#   2. Creates a GitHub Release with all installers attached
#   3. Testers go to https://github.com/<owner>/<repo>/releases and download
#
# Cost: $0 (GitHub gives 2,000 free CI minutes/month for private repos,
#        unlimited for public repos).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# One release at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pre-flight: parse the inline JS in dist/index.html and fail fast on
  # syntax errors. A single missing ')' inside an event handler or helper
  # function has shipped multiple broken releases before this gate existed
  # (v0.4.36 / .37 / .38 all crashed on welcome screen due to one unclosed
  # `order.forEach(function(cat){...})` — invisible until the app actually
  # loads in WebView2/WebKitGTK). This step runs in ~10s and blocks the
  # whole release pipeline if the bundled JS does not parse.
  syntax-check:
    name: JS syntax check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check inline JS in dist/index.html
        run: |
          node -e '
            const fs = require("fs");
            const html = fs.readFileSync("dist/index.html", "utf8");
            const blocks = [...html.matchAll(/<script>([\s\S]*?)<\/script>/g)].map(m => m[1]);
            if (!blocks.length) { console.error("no <script> blocks found"); process.exit(1); }
            const main = blocks.reduce((a,b) => a.length > b.length ? a : b, "");
            try {
              new Function(main);
              console.log("JS syntax OK (" + main.length + " chars across " + blocks.length + " blocks)");
            } catch (e) {
              console.error("SYNTAX ERROR in dist/index.html inline JS:");
              console.error("  " + e.message);
              process.exit(1);
            }
          '

  build:
    needs: syntax-check
    strategy:
      fail-fast: false
      matrix:
        include:
          # Public repo → Actions minutes are unlimited on standard runners.
          # Build only Windows + Linux for now. macOS is intentionally paused
          # until the signing/notarization pipeline is worth the CI cost.
          - platform: ubuntu-22.04
            rust_targets: x86_64-unknown-linux-gnu
            tauri_args: ""
            name: Linux

          - platform: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            tauri_args: ""
            name: Windows

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux: install system dependencies for Tauri + WebKitGTK
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # Install Rust with required targets
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Cache Cargo registry only (not target — stale artifacts cause build failures)
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # Windows releases must be signed. Fail before the expensive build if
      # Azure Trusted Signing is not configured in repository secrets.
      - name: Validate Windows signing secrets
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
        run: |
          set -eu
          missing=0
          for name in \
            AZURE_TENANT_ID \
            AZURE_CLIENT_ID \
            AZURE_CLIENT_SECRET \
            AZURE_ENDPOINT \
            AZURE_CODE_SIGNING_NAME \
            AZURE_CERT_PROFILE_NAME
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      # Windows: install Azure Trusted Signing CLI. Tauri calls it through
      # src-tauri/tauri.windows.conf.json for every Windows binary/installer.
      - name: Install trusted-signing-cli
        if: matrix.platform == 'windows-latest'
        run: cargo install trusted-signing-cli --locked
        shell: bash

      # Build the Tauri app
      - name: Build Skipi
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — REQUIRED for auto-updates:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows Authenticode signing — used by trusted-signing-cli.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Skipi ${{ github.ref_name }}"
          releaseBody: |
            ## Skipi ${{ github.ref_name }}

            Maritime Document Management for Seafarers.

            ### Download

            | Platform | File | Signed? |
            |----------|------|---------|
            | Windows | `.msi` / `.exe` | Authenticode (Azure Trusted Signing) |
            | Linux (Debian/Ubuntu) | `.deb` | minisign (updater) |
            | Linux (universal) | `.AppImage` | minisign (updater) |
            | Linux (RPM-based) | `.rpm` | minisign (updater) |

            ### What's new

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ---

            > **Beta build.** This is a pre-release version for invited testers.
            > All data stays on your computer — Skipi does not have a server yet.
            >
            > **Auto-update:** Existing Skipi installations will be notified about this update automatically.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}

  # After all platform builds finish, assemble latest.json and attach it to the release.
  # (publish-latest-json inherits the syntax-check gate transitively via `build`.)
  # tauri-action itself does NOT aggregate per-platform signatures into one manifest
  # when running across a matrix, so we have to do it in a follow-up job.
  publish-latest-json:
    name: Publish latest.json
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build latest.json from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          mkdir -p sigs
          cd sigs

          # Pull every .sig asset from the release so we can embed the signatures
          gh release download "${TAG}" --repo "${REPO}" --pattern '*.sig' || true
          ls -la

          # Read a signature file if present, otherwise return empty string.
          read_sig() {
            local f="$1"
            if [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          # Asset filenames follow tauri-action conventions.
          MAC_SIG="$(read_sig "Skipi_universal.app.tar.gz.sig")"
          MAC_URL="${BASE_URL}/Skipi_universal.app.tar.gz"

          # Windows: prefer the NSIS .exe updater; fall back to .msi.
          WIN_SIG=""
          WIN_URL=""
          if [ -f "Skipi_${VERSION}_x64-setup.exe.sig" ]; then
            WIN_SIG="$(read_sig "Skipi_${VERSION}_x64-setup.exe.sig")"
            WIN_URL="${BASE_URL}/Skipi_${VERSION}_x64-setup.exe"
          elif [ -f "Skipi_${VERSION}_x64_en-US.msi.sig" ]; then
            WIN_SIG="$(read_sig "Skipi_${VERSION}_x64_en-US.msi.sig")"
            WIN_URL="${BASE_URL}/Skipi_${VERSION}_x64_en-US.msi"
          fi

          # Linux: prefer AppImage (self-contained, portable for updater).
          LINUX_SIG=""
          LINUX_URL=""
          APPIMG="$(ls Skipi_${VERSION}_amd64*.AppImage.sig 2>/dev/null | head -n1 || true)"
          if [ -n "$APPIMG" ]; then
            LINUX_SIG="$(read_sig "$APPIMG")"
            LINUX_URL="${BASE_URL}/${APPIMG%.sig}"
          fi

          cd ..

          # Build the manifest with jq so strings with newlines/special chars are escaped correctly.
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "Skipi $VERSION" \
            --arg mac_sig "$MAC_SIG" \
            --arg mac_url "$MAC_URL" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "$WIN_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$LINUX_URL" \
            '
            def plat(sig; url):
              if (sig|length) > 0 and (url|length) > 0
              then {signature: sig, url: url}
              else null end;

            {
              version: $version,
              pub_date: $pub_date,
              notes: $notes,
              platforms: (
                {
                  "darwin-aarch64": plat($mac_sig; $mac_url),
                  "darwin-x86_64":  plat($mac_sig; $mac_url),
                  "windows-x86_64": plat($win_sig; $win_url),
                  "linux-x86_64":   plat($linux_sig; $linux_url)
                }
                | with_entries(select(.value != null))
              )
            }
            ' > latest.json

          echo "--- latest.json ---"
          cat latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          # --clobber replaces the file if it already exists (e.g. on re-runs).
          gh release upload "${TAG}" latest.json --repo "${REPO}" --clobber
